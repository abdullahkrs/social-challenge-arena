<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Discover quick social challenges and compete with friends.">
  <title>Social Challenge Arena</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <main class="shell">
    <section class="view discovery-view" id="discovery-view" aria-labelledby="page-title">
      <header class="hero">
        <p class="eyebrow">Social Challenge Arena</p>
        <h1 id="page-title">Pick. Play. Compete.</h1>
        <p class="intro">Quick challenges made for friendly competition.</p>
      </header>

      <article class="challenge-card" aria-labelledby="challenge-title">
        <div class="challenge-meta">
          <span class="tag">Speed</span>
          <span>Easy · 20 sec</span>
        </div>
        <h2 id="challenge-title">Tap Sprint</h2>
        <p>Tap as many times as you can before time runs out.</p>
        <button class="primary-action" id="start-challenge" type="button">
          Play now
        </button>
      </article>
    </section>

    <section class="view game-view" id="challenge-view" aria-labelledby="game-title" hidden>
      <header class="game-header">
        <p class="eyebrow">Speed challenge</p>
        <h1 id="game-title">Tap Sprint</h1>
        <p class="game-instruction">Tap fast until time runs out.</p>
      </header>

      <div class="scoreboard" aria-label="Challenge status">
        <div class="stat">
          <strong id="time-value">20</strong>
          <span>seconds</span>
        </div>
        <div class="stat">
          <strong id="tap-count">0</strong>
          <span>taps</span>
        </div>
      </div>

      <button class="tap-action" id="tap-button" type="button">Tap!</button>
      <p class="game-status" id="game-status" aria-live="polite">Ready</p>

      <div class="game-controls">
        <button class="primary-action" id="replay-challenge" type="button" hidden>Play again</button>
        <button class="secondary-action" id="back-to-challenges" type="button">Back</button>
      </div>
    </section>
  </main>
</body>
</html>
