<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <title>Rift Relay Prototype</title>
  <link rel="stylesheet" href="./rift-relay.css">
</head>
<body>
  <main class="prototype-shell">
    <header class="prototype-topbar">
      <div>
        <p class="eyebrow">Visual gameplay prototype</p>
        <h1>Rift Relay</h1>
      </div>
      <div class="prototype-actions">
        <button id="mute-button" type="button" aria-pressed="false">Sound on</button>
        <button id="new-route-button" type="button">New route</button>
      </div>
    </header>

    <section class="game-card" aria-label="Rift Relay prototype">
      <div class="hud" aria-live="polite">
        <span>Score <strong id="score">0</strong></span>
        <span>Zone <strong id="zone">1</strong></span>
        <span>Streak <strong id="streak">0</strong></span>
      </div>

      <div class="stage-wrap">
        <canvas id="stage" width="390" height="640" aria-label="Rift Relay game stage"></canvas>
        <div id="cue" class="cue" aria-live="assertive"></div>
        <div id="start-panel" class="start-panel">
          <p>Move between lanes, jump barriers, and solve the signal gate before the rift reaches you.</p>
          <button id="start-button" type="button">Start run</button>
        </div>
        <div id="result-panel" class="result-panel" hidden>
          <p class="eyebrow">Run ended</p>
          <strong id="final-score">0</strong>
          <span id="result-detail"></span>
          <button id="replay-button" type="button">Replay route</button>
        </div>
      </div>

      <div class="controls" aria-label="Game controls">
        <button type="button" data-action="left" aria-label="Move left">←</button>
        <button type="button" data-action="jump" aria-label="Jump">↑</button>
        <button type="button" data-action="right" aria-label="Move right">→</button>
      </div>
      <p class="hint">Keyboard: ← → to move, Space to jump.</p>
    </section>
  </main>
  <script type="module" src="./rift-relay.mjs"></script>
</body>
</html>
