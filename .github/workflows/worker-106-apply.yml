name: Worker 106 apply

on:
  push:
    branches:
      - worker/106-unify-onboarding-status
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BRANCH_NAME: ${{ github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply coherent delivery
        run: |
          git config user.name "Worker Swarm"
          git config user.email "actions@users.noreply.github.com"
          node scripts/worker-106-hotfix.mjs
          set +e
          node scripts/worker-106-apply.mjs > /tmp/worker-106.log 2>&1
          status=$?
          set -e
          cat /tmp/worker-106.log
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/worker-106.log worker-106-error.txt
            git add worker-106-error.txt
            git commit -m "chore: record worker 106 failure"
            git push origin "HEAD:${BRANCH_NAME}"
            exit "$status"
          fi
      - run: npm test
      - run: npm run build
      - run: rm -rf dist scripts/worker-106-hotfix.mjs worker-106-error.txt
      - name: Commit coherent delivery
        run: |
          git config user.name "Worker Swarm"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Unify concise onboarding and endless status"
          git push origin "HEAD:${BRANCH_NAME}"
