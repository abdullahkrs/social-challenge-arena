name: Production Visual Review

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_review:
        description: Run the full baseline deep review
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: production-visual-review
  cancel-in-progress: true

env:
  PRODUCTION_URL: https://abdullahkrs.github.io/social-challenge-arena

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Install production browser
        run: |
          npm install --no-save --ignore-scripts --no-audit --no-fund playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Determine merged impact
        shell: bash
        run: |
          mkdir -p production-review
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.full_review }}" == "true" ]]; then
            echo "FULL_REVIEW" > production-review/changed-files.txt
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            git diff --name-only HEAD^ HEAD > production-review/changed-files.txt
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > production-review/changed-files.txt
          fi
          cat production-review/changed-files.txt

      - name: Wait for production deployment
        env:
          EXPECTED_SHA: ${{ github.sha }}
        shell: bash
        run: |
          matched=false
          for attempt in {1..36}; do
            html=$(curl -fsSL --max-time 30 "${PRODUCTION_URL}/?production-review=${EXPECTED_SHA}&attempt=${attempt}" 2>/dev/null || true)
            if [[ -n "$html" ]] && printf '%s' "$html" | grep -q '/social-challenge-arena/assets/'; then
              asset=$(printf '%s' "$html" | grep -oE '/social-challenge-arena/assets/[^"'"' ]+\.js' | head -n1)
              if [[ -n "$asset" ]] && curl -fsSL --max-time 30 "https://abdullahkrs.github.io${asset}" >/dev/null; then
                matched=true
                break
              fi
            fi
            echo "Production attempt ${attempt}: waiting for deployable HTML and JavaScript asset"
            sleep 10
          done
          if [[ "$matched" != "true" ]]; then
            echo "Production site did not expose a valid built JavaScript asset."
            exit 1
          fi

      - name: Run production smoke and affected deep review
        env:
          FULL_REVIEW: ${{ inputs.full_review || 'false' }}
          REVIEW_SHA: ${{ github.sha }}
        run: node tests/production-visual-review.mjs

      - name: Upload production review evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-visual-review-${{ github.sha }}
          path: production-review
          if-no-files-found: warn
          retention-days: 14

      - name: Record baseline production visual result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEW_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          issue_state=$(gh issue view 109 --repo "$GITHUB_REPOSITORY" --json state --jq '.state' 2>/dev/null || echo UNKNOWN)
          if [[ "$issue_state" != "OPEN" ]]; then
            echo "Baseline issue #109 is not open; no audit comment required."
            exit 0
          fi

          report="production-review/report.json"
          if [[ "$JOB_STATUS" == "success" && -f "$report" ]]; then
            challenge_count=$(jq '[.discoveredChallenges[].id] | unique | length' "$report")
            smoke_passes=$(jq '[.smoke[] | select(.status == "pass") | .id] | unique | length' "$report")
            smoke_failures=$(jq '[.smoke[] | select(.status == "fail")] | length' "$report")
            deep_pairs=$(jq '[.deep[] | select(.status == "pass") | "\(.id):\(.locale)"] | unique | length' "$report")
            deep_failures=$(jq '[.deep[] | select(.status == "fail")] | length' "$report")
            error_count=$(jq '.errors | length' "$report")
            locales=$(jq -r '[.deep[].locale] | unique | sort | join(",")' "$report")
            deep_all=$(jq -r '.plan.deepAll // false' "$report")
            locale_plan=$(jq -r '.plan.locales // false' "$report")
            expected_pairs=$((challenge_count * 3))

            if [[ "$challenge_count" -gt 0 && "$smoke_passes" -eq "$challenge_count" && "$smoke_failures" -eq 0 && "$deep_pairs" -eq "$expected_pairs" && "$deep_failures" -eq 0 && "$error_count" -eq 0 && "$locales" == "ar,en,tr" && "$deep_all" == "true" && "$locale_plan" == "true" ]]; then
              printf -v body '%s\n\n%s\n%s\n%s\n%s' \
                'Production Visual Check: PASS' \
                "- Production SHA: \`${REVIEW_SHA}\`." \
                "- Run and downloadable evidence: ${RUN_URL}." \
                "- Smoke: all ${challenge_count} discovered challenges passed." \
                "- Deep review: all ${challenge_count} challenges passed in Arabic RTL, English, and Turkish with zero recorded errors."
              gh issue comment 109 --repo "$GITHUB_REPOSITORY" --body "$body"
              exit 0
            fi
          fi

          if [[ -f "$report" ]]; then
            summary=$(jq -c '{plan, challenges: (.discoveredChallenges | length), smokeFailures: ([.smoke[] | select(.status == "fail")] | length), deepFailures: ([.deep[] | select(.status == "fail")] | length), errors: (.errors | length)}' "$report")
          else
            summary='report.json unavailable'
          fi

          printf -v body '%s\n\n%s\n%s\n%s\n%s' \
            'Production Visual Check: FAIL' \
            "- Production SHA: \`${REVIEW_SHA}\`; job status: \`${JOB_STATUS}\`." \
            "- Run and available evidence: ${RUN_URL}." \
            "- Report summary: \`${summary}\`." \
            '- Baseline remains open; no future product issue may start until this blocker is repaired or reduced.'
          gh issue comment 109 --repo "$GITHUB_REPOSITORY" --body "$body"
          exit 1
