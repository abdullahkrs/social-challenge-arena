name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Run tests
        run: npm test > test-output.log 2>&1
      - name: Upload failed test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-test-output
          path: test-output.log
          if-no-files-found: error
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: static-preview
          path: dist
          if-no-files-found: error
