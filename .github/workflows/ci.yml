name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout commit without reusable actions
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Verify Node.js runtime
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 20) { console.error('Node.js 20 or newer is required.'); process.exit(1); }"

      - name: Run tests
        run: npm test

      - name: Build static preview
        run: npm run build

      - name: Verify build output
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/styles.css
          test -f dist/app.js
