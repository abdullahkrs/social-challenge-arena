<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080d22">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none'; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'none'">
  <meta name="description" content="Fast multilingual social skill challenges.">
  <title>Social Challenge Arena</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./ui.css">
  <link rel="stylesheet" href="./ui-accessibility.css">
  <link rel="stylesheet" href="./mirror.css">
</head>
<body>
  <div id="loading" class="loading" aria-live="polite" data-i18n="loading">Loading challenges</div>
  <div id="app" hidden>
    <header class="topbar">
      <a class="brand" href="./" aria-label="Social Challenge Arena" data-i18n-aria="appName">
        <span class="brand-mark fa-icon fa-gamepad" aria-hidden="true"></span>
        <span data-i18n="appName">Social Challenge Arena</span>
      </a>
      <div class="controls">
        <label class="select-wrap">
          <span class="fa-icon fa-globe control-icon" aria-hidden="true"></span>
          <span class="sr-only" data-i18n="language">Language</span>
          <select id="language-select" aria-label="Language" data-i18n-aria="language">
            <option value="ar">العربية</option><option value="en">English</option><option value="tr">Türkçe</option>
          </select>
        </label>
        <label class="motion-control">
          <span class="fa-icon fa-universal-access" aria-hidden="true"></span>
          <input id="motion-toggle" type="checkbox" aria-label="Reduce effects" data-i18n-aria="reduceMotion">
          <span data-i18n="reduceMotion">Reduce effects</span>
        </label>
      </div>
    </header>

    <div id="error-banner" class="banner" role="alert" hidden></div>

    <main>
      <section class="screen discovery" data-screen="discovery">
        <div class="catalog-header">
          <p class="eyebrow" data-i18n="discoveryEyebrow">Pick your skill</p>
          <h1 tabindex="-1" data-i18n="catalogTitle">Choose a challenge</h1>
          <p class="tagline" data-i18n="catalogHint">Four fast games. One score to beat.</p>
          <div id="invited-badge" class="invite-badge" hidden>
            <span class="fa-icon fa-user-group" aria-hidden="true"></span>
            <strong data-i18n="invited">Friend challenge</strong><span id="target-text"></span>
          </div>
        </div>

        <section id="daily-entry" class="daily-entry" aria-labelledby="daily-title">
          <span id="daily-icon" class="daily-icon" aria-hidden="true">◎</span>
          <div class="daily-copy">
            <p id="daily-date" class="daily-date"></p>
            <h2 id="daily-title" data-i18n="dailyTitle">Today's challenge</h2>
            <p class="daily-meta"><strong id="daily-challenge-name"></strong><span id="daily-tagline"></span></p>
            <p id="daily-best" class="daily-best"></p>
          </div>
          <button id="daily-start-button" class="primary daily-start" type="button" data-i18n="dailyPlay">Play daily</button>
        </section>

        <div id="catalog" class="catalog" aria-label="Choose a challenge" data-i18n-aria="catalogTitle">
          <button class="challenge-card orbit-card" type="button" data-challenge-id="orbit-lock">
            <span class="card-visual orbit-visual" aria-hidden="true"><i></i></span>
            <span class="card-copy"><strong data-name></strong><small data-tagline></small></span>
            <span class="card-meta"><span data-skill></span><span data-duration></span></span>
          </button>
          <button class="challenge-card echo-card" type="button" data-challenge-id="echo-grid">
            <span class="card-visual echo-visual" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
            <span class="card-copy"><strong data-name></strong><small data-tagline></small></span>
            <span class="card-meta"><span data-skill></span><span data-duration></span></span>
          </button>
          <button class="challenge-card lumen-card" type="button" data-challenge-id="lumen-lanes">
            <span class="card-visual lumen-visual" aria-hidden="true"><i></i><i></i><i></i><b>→</b></span>
            <span class="card-copy"><strong data-name></strong><small data-tagline></small></span>
            <span class="card-meta"><span data-skill></span><span data-duration></span></span>
          </button>
          <button class="challenge-card mirror-card" type="button" data-challenge-id="mirror-fuse">
            <span class="card-visual mirror-visual" aria-hidden="true">
              <span class="mirror-mini mirror-mini-source"><i>◆</i><i>·</i><i>◆</i><i>·</i><i>◆</i><i>·</i></span>
              <b></b>
              <span class="mirror-mini mirror-mini-answer"><i>◆</i><i>·</i><i>◆</i><i>·</i><i>◆</i><i>·</i></span>
            </span>
            <span class="card-copy"><strong data-name></strong><small data-tagline></small></span>
            <span class="card-meta"><span data-skill></span><span data-duration></span></span>
          </button>
        </div>
        <p class="privacy" data-i18n="privacy">No account. No tracking.</p>
      </section>

      <section class="screen instructions" data-screen="instructions" hidden>
        <button class="icon-button back-button" type="button" data-action="back" data-i18n-aria="back" aria-label="Back"><span class="fa-icon fa-arrow-left" aria-hidden="true"></span></button>
        <div class="instruction-card">
          <p id="instruction-eyebrow" class="eyebrow" hidden></p>
          <div id="instruction-icon" class="instruction-icon" aria-hidden="true">◎</div>
          <h2 id="instruction-title" tabindex="-1"></h2>
          <p id="instruction-copy"></p>
          <strong id="instruction-target" class="target-callout"></strong>
          <button id="start-button" class="primary large" type="button" data-i18n="start">Start</button>
          <button id="invite-catalog-button" class="ghost invite-catalog" type="button" data-i18n="browseChallenges" hidden>Browse challenges</button>
        </div>
      </section>

      <section class="screen game" data-screen="game" hidden>
        <h2 id="game-heading" class="sr-only" tabindex="-1"></h2>
        <div class="hud" aria-label="Game status" data-i18n-aria="gameStatusLabel">
          <div><span data-i18n="score">Score</span><strong id="score-value">0</strong></div>
          <div><span data-i18n="round">Round</span><strong id="round-value">1/12</strong></div>
          <div><span data-i18n="lives">Chances</span><strong id="lives-value">3</strong></div>
          <div><span data-i18n="combo">Streak</span><strong id="combo-value">0</strong></div>
        </div>
        <div class="arena-shell">
          <canvas id="game-canvas" tabindex="0" role="button" aria-label="Orbit Lock game arena" aria-keyshortcuts="Space Enter"></canvas>
          <div id="echo-grid" class="echo-grid" role="group" aria-label="Echo Grid game board" hidden>
            <button type="button" data-cell="0"></button><button type="button" data-cell="1"></button><button type="button" data-cell="2"></button>
            <button type="button" data-cell="3"></button><button type="button" data-cell="4"></button><button type="button" data-cell="5"></button>
            <button type="button" data-cell="6"></button><button type="button" data-cell="7"></button><button type="button" data-cell="8"></button>
          </div>
          <div id="lumen-lanes" class="lumen-lanes" role="group" aria-label="Lumen Lanes game arena" hidden>
            <div class="lumen-stage" aria-hidden="true">
              <span class="lumen-rail"></span><span class="lumen-rail"></span><span class="lumen-rail"></span>
              <strong data-lumen-cue>◆</strong>
            </div>
            <div class="lumen-controls">
              <button type="button" data-lane="0" aria-label="Left lane"><span aria-hidden="true">←</span></button>
              <button type="button" data-lane="1" aria-label="Center lane"><span aria-hidden="true">◆</span></button>
              <button type="button" data-lane="2" aria-label="Right lane"><span aria-hidden="true">→</span></button>
            </div>
          </div>
          <div id="mirror-fuse" class="mirror-fuse" role="group" aria-label="Mirror Fuse reflection puzzle" dir="ltr" hidden>
            <div class="mirror-stage" aria-hidden="true">
              <div class="mirror-grid mirror-source" data-mirror-source></div>
              <span class="mirror-axis"></span>
              <span class="mirror-question">?</span>
            </div>
            <div class="mirror-options">
              <button type="button" data-mirror-option="0" aria-label="Mirror option 1"><span class="mirror-number" aria-hidden="true">1</span><span class="mirror-grid" data-mirror-grid aria-hidden="true"></span><span class="mirror-mark" data-mirror-mark aria-hidden="true"></span></button>
              <button type="button" data-mirror-option="1" aria-label="Mirror option 2"><span class="mirror-number" aria-hidden="true">2</span><span class="mirror-grid" data-mirror-grid aria-hidden="true"></span><span class="mirror-mark" data-mirror-mark aria-hidden="true"></span></button>
              <button type="button" data-mirror-option="2" aria-label="Mirror option 3"><span class="mirror-number" aria-hidden="true">3</span><span class="mirror-grid" data-mirror-grid aria-hidden="true"></span><span class="mirror-mark" data-mirror-mark aria-hidden="true"></span></button>
            </div>
          </div>
          <p id="game-status" class="game-status" aria-hidden="true">Ready</p>
          <p id="controls-hint" class="controls-hint"></p>
        </div>
      </section>

      <section class="screen result" data-screen="result" hidden>
        <div class="result-card">
          <span class="result-mark fa-icon fa-trophy" aria-hidden="true"></span>
          <p class="eyebrow" id="result-summary"></p>
          <h2 id="result-heading" tabindex="-1">Your result</h2>
          <p id="result-challenge" class="result-challenge"></p>
          <div id="result-score" class="result-score">0</div>
          <p id="daily-result" class="daily-result" hidden></p>
          <div id="comparison" class="comparison" role="group" aria-labelledby="comparison-title" hidden>
            <span id="comparison-title" class="sr-only" data-i18n="compareTitle">Head-to-head</span>
            <div class="duel-score"><span data-i18n="challenger">Challenger</span><strong id="challenger-score">0</strong></div>
            <div class="comparison-outcome">
              <span id="comparison-symbol" class="comparison-symbol" aria-hidden="true"></span>
              <strong id="comparison-text"></strong>
              <small id="difference-text"></small>
            </div>
            <div class="duel-score"><span data-i18n="you">You</span><strong id="player-score">0</strong></div>
          </div>
          <div class="result-actions">
            <button id="share-button" class="primary" type="button" data-i18n="share">Challenge a friend</button>
            <button id="replay-button" class="secondary" type="button" data-i18n="replay">Replay</button>
            <button id="new-button" class="ghost" type="button" data-i18n="newRun">New route</button>
            <button id="catalog-button" class="ghost" type="button" data-i18n="catalog">All challenges</button>
          </div>
        </div>
      </section>
    </main>
    <div id="live-region" class="sr-only" aria-live="assertive" aria-atomic="true"></div>
  </div>
  <script type="module" src="./src/app.mjs"></script>
</body>
</html>
